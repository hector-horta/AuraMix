<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraMix Web Auto-DJ | Inteligencia de Mezcla en tu Navegador</title>
    <meta name="description" content="Un mezclador automático de música en tiempo real en tu navegador. Sincroniza BPM y tonalidad usando Camelot Code mediante Web Audio API." />
    <!-- Google Fonts for Premium Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Outfit:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- SVG Filters for Vertical Motion Blur -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 0; height: 0; pointer-events: none;">
      <defs>
        <filter id="vertical-blur-heavy">
          <feGaussianBlur stdDeviation="0 8" />
        </filter>
        <filter id="vertical-blur-light">
          <feGaussianBlur stdDeviation="0 1.5" />
        </filter>
      </defs>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
